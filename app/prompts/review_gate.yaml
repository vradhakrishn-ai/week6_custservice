name: review_gate
version: 1.0.0
author: support-ops
model_compatibility: [gpt-4o-mini, gpt-4o]
changelog:
  - version: 1.0.0 | Added a human-review prompt for high-impact actions.
input_variables: [input]
template: |
  Review the proposed action for safety and customer impact.
  Flag anything that needs a human reviewer before it is executed.
  Return a short recommendation with the reason.
